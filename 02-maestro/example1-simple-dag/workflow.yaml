description:
  name: simple-dag
  description: Four-step sequential workflow demonstrating DAG dependencies

env:
  variables:
    SLEEP_TIME: 3

study:
  - name: prepare
    description: Generate input data for simulation
    run:
      cmd: |
        bash $(SPECROOT)/scripts/prepare.sh $(WORKSPACE)/input.dat
        echo "Prepared input data at $(WORKSPACE)/input.dat"

  - name: simulate
    description: Run simulation using prepared data
    run:
      cmd: |
        python $(SPECROOT)/scripts/simulate.py \
          $(prepare.workspace)/input.dat \
          $(WORKSPACE)/results.txt \
          $(SLEEP_TIME)
        echo "Simulation complete, results at $(WORKSPACE)/results.txt"
      depends: [prepare]

  - name: analyze
    description: Analyze simulation results
    run:
      cmd: |
        python $(SPECROOT)/scripts/analyze.py \
          $(simulate.workspace)/results.txt \
          $(WORKSPACE)/summary.txt
        echo "Analysis complete, summary at $(WORKSPACE)/summary.txt"
      depends: [simulate]

  - name: visualize
    description: Create plots from analysis
    run:
      cmd: |
        python $(SPECROOT)/scripts/visualize.py \
          $(analyze.workspace)/summary.txt \
          $(WORKSPACE)/plot.txt
        echo "Visualization complete, plot at $(WORKSPACE)/plot.txt"
      depends: [analyze]
