description:
  name: example1-distributed
  description: Basic distributed workflow with Redis queues

env:
  variables:
    OUTPUT_PATH: $PSCRATCH/wf-seminar-merlin

batch:
  type: slurm
  host: perlmutter
  bank: ntrain3  # Change to your account
  reservation: workflow_training

global.parameters:
  PARAM:
    values: [1, 2, 3, 4, 5]
    label: PARAM.%%

merlin:
  resources:
    workers:
      sim_workers:
        args: --concurrency 4 --prefetch-multiplier 1 -O fair
        steps: [all]

study:
  - name: generate
    description: Generate input data
    run:
      cmd: |
        echo "Generated at $(date)" > $(WORKSPACE)/output.txt
        for i in {1..5}; do
          echo "Input data for PARAM $i" >> $(WORKSPACE)/output.txt
        done
        echo "Generation complete"

  - name: process
    description: Process each parameter value (distributed to workers)
    run:
      cmd: |
        python $(SPECROOT)/scripts/process_task.py \
          --param $(PARAM) \
          --input $(generate.workspace)/output.txt \
          --output $(WORKSPACE)/result.txt
        echo "Processed PARAM=$(PARAM)"
      depends: [generate]
      task_queue: simulations

  - name: aggregate
    description: Aggregate results from all parameter values
    run:
      cmd: |
        echo "Aggregating results from all PARAM values" > $(WORKSPACE)/summary.txt
        for p in 1 2 3 4 5; do
          result_file=$(process.workspace)/PARAM.$p/result.txt
          if [ -f "$result_file" ]; then
            cat "$result_file" >> $(WORKSPACE)/summary.txt
          fi
        done
        echo "Aggregation complete"
      depends: [process_*]
