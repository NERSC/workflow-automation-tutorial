description:
  name: fault-tolerance-demo
  description: Demonstrates retry and restart mechanisms

env:
  variables:
    OUTPUT_PATH: $PSCRATCH/wf-seminar-merlin

batch:
  type: slurm
  host: perlmutter
  bank: ntrain3  # Change to your account
  reservation: workflow_training

merlin:
  resources:
    workers:
      fault_workers:
        args: --concurrency 2 -O fair
        steps: [all]

study:
  - name: flaky_task
    description: Task that fails randomly, retries automatically
    run:
      cmd: |
        bash $(SPECROOT)/scripts/flaky_task.sh $(WORKSPACE)/attempt.log $(MERLIN_RETRY)
      retry_delay: 5
      max_retries: 3
      task_queue: flaky_queue

  - name: checkpoint_task
    description: Task with restart capability
    run:
      cmd: |
        if [ -f $(WORKSPACE)/checkpoint.txt ]; then
          echo "Resuming from checkpoint"
          start=$(cat $(WORKSPACE)/checkpoint.txt)
        else
          start=1
        fi
        for i in $(seq $start 5); do
          echo "Processing step $i"
          echo $i > $(WORKSPACE)/checkpoint.txt
          sleep 1
          if [ $i -eq 3 ] && [ ! -f $(WORKSPACE)/recovered ]; then
            echo "Simulated failure at step 3"
            touch $(WORKSPACE)/failed_once
            exit $(MERLIN_RESTART)
          fi
        done
        echo "Completed all steps"
        touch $(WORKSPACE)/recovered
      restart: |
        echo "Restarting from checkpoint..."
        if [ -f $(WORKSPACE)/checkpoint.txt ]; then
          start=$(cat $(WORKSPACE)/checkpoint.txt)
        else
          start=1
        fi
        for i in $(seq $start 5); do
          echo "Processing step $i (restart)"
          echo $i > $(WORKSPACE)/checkpoint.txt
          sleep 1
        done
        echo "Completed all steps on restart"
        touch $(WORKSPACE)/recovered
      depends: [flaky_task]
